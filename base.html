<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ServiceDesk{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  {% block navbar %}
  <nav class="navbar">
    <a href="{{ url_for('index') }}" class="navbar-brand">
      <span class="icon">🔧</span> ServiceDesk
    </a>
    <div class="navbar-links">
      {% if session.get('user_id') %}
        <a href="{{ url_for('user_dashboard') }}">Dashboard</a>
        <a href="{{ url_for('submit_request') }}">New Request</a>
        <a href="{{ url_for('logout') }}" class="btn-nav">Logout</a>
      {% elif session.get('admin_id') %}
        <a href="{{ url_for('admin_dashboard') }}">Admin Panel</a>
        <a href="{{ url_for('admin_logout') }}" class="btn-nav">Logout</a>
      {% else %}
        <a href="{{ url_for('user_login') }}">Login</a>
        <a href="{{ url_for('register') }}" class="btn-nav">Register</a>
      {% endif %}
    </div>
  </nav>
  {% endblock %}

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
